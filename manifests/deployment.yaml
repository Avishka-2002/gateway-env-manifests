apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-web
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        version: green  # මුලින්ම Green version එක විදිහට දාමු
    spec:
      containers:
      - name: web-container
        image: mgavishka/gateway-app:v2 # ඔයා push කරපු image එක
        ports:
        - containerPort: 80